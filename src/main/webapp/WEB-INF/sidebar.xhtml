<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:f="http://java.sun.com/jsf/core"
    xmlns:h="http://java.sun.com/jsf/html"
    xmlns:ui="http://java.sun.com/jsf/facelets"
    xmlns:p="http://primefaces.org/ui"
    xmlns:pm="http://primefaces.org/manhattan">

    <div class="layout-sidebar">
        <div class="layout-sidebar-logo">
            <a href="#" id="layout-sidebar-anchor" class="layout-sidebar-anchor" title="Toggle Menu">
                <i class="pi"/>
            </a>
        </div>
        <div class="layout-menu-container">
            <h:form id="menuform">
                <pm:menu widgetVar="ManhattanMenuWidget">
                    <p:menuitem id="mnuHome"       value="Home"        icon="pi pi-fw pi-home"       outcome="/admin/home.xhtml"/>
                    <p:menuitem id="mnuBacklog"    value="Backlog"     icon="pi pi-fw pi-list"       outcome="/admin/backlog.xhtml"/>
                    <p:menuitem id="mnuEmprestimo" value="Emprestimos" icon="pi pi-fw pi-share-alt"  outcome="/admin/emprestimo.xhtml"/>
                    <p:menuitem id="mnuWishlist"   value="Wishlist"    icon="pi pi-fw pi-heart"      outcome="/admin/wishlist.xhtml"/>
                    <p:menuitem id="mnuAvaliacao"  value="Avaliacoes"  icon="pi pi-fw pi-star"       outcome="/admin/avaliacao.xhtml"/>
                    <p:menuitem id="mnuSair"       value="Sair"        icon="pi pi-fw pi-sign-out"   action="#{loginController.logout()}"/>
                </pm:menu>
            </h:form>
        </div>
    </div>

</ui:composition>
